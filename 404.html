<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page introuvable | Sundara Investment Group</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #f5f5f5;
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .logo {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.25em;
      color: rgba(245,245,245,0.5);
      text-transform: uppercase;
      margin-bottom: 64px;
    }
    .logo span {
      color: #B8922A;
      margin: 0 8px;
    }
    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(96px, 20vw, 160px);
      font-weight: 300;
      color: #B8922A;
      line-height: 1;
      margin-bottom: 24px;
      opacity: 0.9;
    }
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 400;
      color: #f5f5f5;
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }
    .subtitle {
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: rgba(245,245,245,0.5);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 48px;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: #B8922A;
      margin: 0 auto 48px;
    }
    .btns {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-primary {
      background: #B8922A;
      color: #0d0d0d;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      display: inline-block;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      background: transparent;
      color: #f5f5f5;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      border: 1px solid rgba(245,245,245,0.2);
      display: inline-block;
      transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: #B8922A; color: #B8922A; }
  </style>
</head>
<body>
  <div class="logo">Sundara <span>·</span> Investment Group</div>
  <div class="code">404</div>
  <h1 class="title">Cette page n'existe pas</h1>
  <p class="subtitle">La page que vous cherchez a été déplacée ou n'existe plus. Explorez nos opportunités d'investissement disponibles.</p>
  <div class="divider"></div>
  <div class="btns">
    <a href="index.html" class="btn-primary">Retour à l'accueil</a>
    <a href="invest.html" class="btn-secondary">Voir les investissements</a>
  </div>
</body>
</html>

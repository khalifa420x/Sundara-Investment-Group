/* ── CURRENCY ─────────────────────────────────────────────────────── */
const CUR_RATES = { USD: 1, EUR: 0.92, GBP: 0.79, IDR: 15800 };
const CUR_SYMS  = { USD: '$', EUR: '€', GBP: '£', IDR: 'IDR\u00a0' };
let activeCur = localStorage.getItem('sundara-currency') || 'USD';

function fmtPrice(usd, cur) {
  const val = Math.round(usd * CUR_RATES[cur]);
  if (cur === 'IDR') return 'IDR\u00a0' + val.toLocaleString('id-ID');
  return CUR_SYMS[cur] + val.toLocaleString('en-US');
}

function setCurrency(cur) {
  activeCur = cur;
  localStorage.setItem('sundara-currency', cur);
  document.querySelectorAll('[data-price-usd]').forEach(el => {
    el.classList.add('updating');
    setTimeout(() => {
      el.textContent = fmtPrice(+el.dataset.priceUsd, activeCur) + (el.dataset.suffix || '');
      el.classList.remove('updating');
    }, 150);
  });
  syncCurBtns();
}

function syncCurBtns() {
  document.querySelectorAll('.cur-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cur === activeCur);
  });
}

/* ── REVEAL OBSERVER ──────────────────────────────────────────────── */
const rvIO = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); rvIO.unobserve(e.target); }
  });
}, { threshold: 0.06, rootMargin: '0px 0px -30px 0px' });

/* ── BUILD HERO ───────────────────────────────────────────────────── */
function buildHero(v, lang) {
  const fr     = lang === 'fr';
  const name   = fr ? v.name_fr  : v.name_en;
  const badge  = fr ? v.badge_fr : v.badge_en;
  const suffix = fr ? '\u00a0/ nuit' : '\u00a0/ night';
  const fromLbl = fr ? '\u00c0 partir de' : 'From';
  const specs  = fr
    ? v.bedrooms + '\u00a0chambres\u00a0\u00b7 Piscine priv\u00e9e\u00a0\u00b7 ' + v.sqm + '\u00a0m\u00b2'
    : v.bedrooms + '\u00a0bedrooms\u00a0\u00b7 Private pool\u00a0\u00b7 ' + v.sqm + '\u00a0sqm';

  document.getElementById('vdHeroWrap').innerHTML =
    '<section class="vd-hero" id="vdHero">' +
      '<div class="vd-hero-bg" id="vdHeroBg" style="background-image:url(' + v.images[0] + ')"></div>' +
      '<div class="vd-hero-overlay"></div>' +
      '<div class="vd-hero-content">' +
        '<p class="vd-hero-location">' + v.location + '</p>' +
        '<h1 class="vd-hero-name">' + name + '</h1>' +
        '<p class="vd-hero-specs">' + specs + '</p>' +
        '<div class="vd-hero-price-wrap">' +
          '<span class="vd-hero-price-label">' + fromLbl + '</span>' +
          '<span class="vd-hero-price" data-price-usd="' + v.price_usd + '" data-suffix="' + suffix + '">' +
            fmtPrice(v.price_usd, activeCur) + suffix +
          '</span>' +
        '</div>' +
      '</div>' +
    '</section>';

  /* sticky bar */
  const ctaLbl = fr ? 'V\u00e9rifier\u00a0\u2192' : 'Check Availability\u00a0\u2192';
  document.getElementById('vdStickyWrap').innerHTML =
    '<div class="vd-sticky-bar" id="vdStickyBar">' +
      '<span class="vd-sticky-name">' + name + '</span>' +
      '<div class="vd-sticky-right">' +
        '<span class="vd-sticky-price" data-price-usd="' + v.price_usd + '" data-suffix="' + suffix + '">' +
          fmtPrice(v.price_usd, activeCur) + suffix +
        '</span>' +
        '<a href="contact.html?type=rental&villa=' + v.id + '" class="vd-sticky-btn">' + ctaLbl + '</a>' +
      '</div>' +
    '</div>';

  /* show sticky bar when hero leaves viewport */
  const heroEl   = document.getElementById('vdHero');
  const stickyEl = document.getElementById('vdStickyBar');
  const heroObs  = new IntersectionObserver(entries => {
    stickyEl.classList.toggle('visible', !entries[0].isIntersecting);
  }, { threshold: 0, rootMargin: '-70px 0px 0px 0px' });
  heroObs.observe(heroEl);
}

/* ── BUILD THUMBS ─────────────────────────────────────────────────── */
function buildThumbs(v) {
  const wrap   = document.getElementById('vdThumbs');
  wrap.className = 'vd-thumbs';
  wrap.innerHTML = '';
  const heroBg = document.getElementById('vdHeroBg');

  v.images.forEach((src, i) => {
    const div = document.createElement('div');
    div.className = 'vd-thumb' + (i === 0 ? ' active' : '');
    div.innerHTML = '<img src="' + src + '" alt="' + v.name_en + ' ' + (i + 1) + '" loading="lazy">';
    div.addEventListener('click', () => {
      if (heroBg) heroBg.style.backgroundImage = 'url(' + src + ')';
      wrap.querySelectorAll('.vd-thumb').forEach(t => t.classList.remove('active'));
      div.classList.add('active');
    });
    wrap.appendChild(div);
  });
}

/* ── BUILD DETAIL ─────────────────────────────────────────────────── */
function buildDetail(v, lang) {

  const amenList  = fr ? v.amenities_fr    : v.amenities_en;

  const specsLbl  = fr ? 'Caract\u00e9ristiques' : 'Specifications';
  const amenLbl   = fr ? '\u00c9quipements'       : 'Amenities';
  const bedLbl    = fr ? 'Chambres'               : 'Bedrooms';
  const bathLbl   = fr ? 'Salles de bain'         : 'Bathrooms';
  const sqmLbl    = fr ? 'Surface'                : 'Area';
  const poolLbl   = fr ? 'Piscine'                : 'Pool';
  const fromLbl   = fr ? '\u00c0 partir de'       : 'From';
  const nightLbl  = fr ? 'par nuit'               : 'per night';
  const ctaLbl    = fr ? 'Demander la disponibilit\u00e9 \u2192' : 'Check Availability \u2192';
  const noteLbl   = fr ? 'R\u00e9ponse garantie sous 48h\u00a0\u00b7 Service confidentiel'
                       : '48h guaranteed response\u00a0\u00b7 Confidential service';
  const bedsRow   = fr ? 'Chambres'               : 'Bedrooms';
  const bathRow   = fr ? 'Salles de bain'         : 'Bathrooms';
  const sqmRow    = fr ? 'Surface'                : 'Area';
  const typeRow   = fr ? 'Type de s\u00e9jour'    : 'Stay type';
  const typeVal   = v.type === 'short-term'
    ? (fr ? 'Court s\u00e9jour' : 'Short-term')
    : (fr ? 'Long s\u00e9jour'  : 'Long-term');

  const amenItems = amenList.map(a => '<div class="vd-amenity">' + a + '</div>').join('');

  document.getElementById('vdInfo').innerHTML =
    '<div class="reveal">' +
      '<p class="vd-section-label">' + aboutLbl + '</p>' +
      '<p class="vd-description">' + desc + '</p>' +
    '</div>' +
    '<div class="reveal">' +
      '<p class="vd-section-label">' + specsLbl + '</p>' +
      '<div class="vd-specs-grid">' +
        '<div class="vd-spec"><p class="vd-spec-val">' + v.bedrooms  + '</p><p class="vd-spec-key">' + bedLbl  + '</p></div>' +
        '<div class="vd-spec"><p class="vd-spec-val">' + v.bathrooms + '</p><p class="vd-spec-key">' + bathLbl + '</p></div>' +
        '<div class="vd-spec"><p class="vd-spec-val">' + v.sqm       + '</p><p class="vd-spec-key">' + sqmLbl + ' m\u00b2</p></div>' +
        '<div class="vd-spec"><p class="vd-spec-val">\u2714</p><p class="vd-spec-key">' + poolLbl + '</p></div>' +
      '</div>' +
    '</div>' +
    '<div class="reveal">' +
      '<p class="vd-section-label">' + amenLbl + '</p>' +
      '<div class="vd-amenities">' + amenItems + '</div>' +
    '</div>';

  document.getElementById('vdBooking').innerHTML =
    '<div class="vd-book-card reveal">' +
      '<p class="vd-book-price-label">' + fromLbl + '</p>' +
      '<p class="vd-book-price" data-price-usd="' + v.price_usd + '" data-suffix="">' +
        fmtPrice(v.price_usd, activeCur) +
      '</p>' +
      '<p class="vd-book-price-night">' + nightLbl + '</p>' +
      '<div class="vd-book-divider"></div>' +
      '<div class="vd-book-row"><span class="vd-book-row-label">' + bedsRow  + '</span><span class="vd-book-row-val">' + v.bedrooms  + '</span></div>' +
      '<div class="vd-book-row"><span class="vd-book-row-label">' + bathRow  + '</span><span class="vd-book-row-val">' + v.bathrooms + '</span></div>' +
      '<div class="vd-book-row"><span class="vd-book-row-label">' + sqmRow   + '</span><span class="vd-book-row-val">' + v.sqm + ' m\u00b2</span></div>' +
      '<div class="vd-book-row"><span class="vd-book-row-label">' + typeRow  + '</span><span class="vd-book-row-val">' + typeVal + '</span></div>' +
      '<div class="vd-book-divider"></div>' +
      '<a href="contact.html?type=rental&villa=' + v.id + '" class="vd-book-cta">' + ctaLbl + '</a>' +
      '<p class="vd-book-note">' + noteLbl + '</p>' +
    '</div>';

  document.querySelectorAll('#vdInfo .reveal, #vdBooking .reveal').forEach(el => rvIO.observe(el));
}

/* ── BUILD RELATED ────────────────────────────────────────────────── */
function buildRelated(currentId, lang) {
  const fr     = lang === 'fr';
  const others = VILLAS.filter(v => v.id !== currentId);
  if (!others.length) return;

  const titleText = fr ? 'Autres villas disponibles' : 'Other available villas';
  const suffix    = fr ? '\u00a0/ nuit'                            : '\u00a0/ night';
  const fromLbl   = fr ? '\u00c0 partir de'                        : 'From';
  const ctaLbl    = fr ? 'V\u00e9rifier disponibilit\u00e9s\u00a0\u2192' : 'Check Availability\u00a0\u2192';
  const viewLbl   = fr ? 'Voir les d\u00e9tails\u00a0\u2192'       : 'View Details\u00a0\u2192';

  const wrap = document.getElementById('vdRelated');
  wrap.innerHTML =
    '<h2 class="vd-related-title">' + titleText + '</h2>' +
    '<div class="rent-grid" id="relatedGrid"></div>';

  const grid = document.getElementById('relatedGrid');
  others.forEach(v => {
    const name  = fr ? v.name_fr : v.name_en;
    const badge = fr ? v.badge_fr : v.badge_en;
    const specs = fr
      ? v.bedrooms + '\u00a0chambres\u00a0\u00b7 Piscine priv\u00e9e\u00a0\u00b7 ' + v.sqm + '\u00a0m\u00b2'
      : v.bedrooms + '\u00a0bedrooms\u00a0\u00b7 Private pool\u00a0\u00b7 ' + v.sqm + '\u00a0sqm';

    const card = document.createElement('div');
    card.className = 'rv-card reveal';
    card.addEventListener('click', () => { window.location = 'villa.html?id=' + v.id; });

    card.innerHTML =
      '<div class="rv-card-img">' +
        '<img src="' + v.images[0] + '" alt="' + name + '" loading="lazy">' +
        '<span class="rv-card-badge ' + v.badge_cls + '">' + badge + '</span>' +
        '<div class="rv-card-overlay"><span class="rv-card-overlay-text">' + viewLbl + '</span></div>' +
      '</div>' +
      '<div class="rv-card-body">' +
        '<p class="rv-card-location">' + v.location + '</p>' +
        '<h3 class="rv-card-name">' + name + '</h3>' +
        '<p class="rv-card-specs">' + specs + '</p>' +
        '<p class="rv-card-price-label">' + fromLbl + '</p>' +
        '<p class="rv-card-price" data-price-usd="' + v.price_usd + '" data-suffix="' + suffix + '">' +
          fmtPrice(v.price_usd, activeCur) + suffix +
        '</p>' +
        '<a href="villa.html?id=' + v.id + '" class="rv-card-btn" onclick="event.stopPropagation()">' + ctaLbl + '</a>' +
      '</div>';

    grid.appendChild(card);
    rvIO.observe(card);
  });
}

/* ── INIT ─────────────────────────────────────────────────────────── */
function init() {
  syncCurBtns();

  const lang    = localStorage.getItem('sundara-lang') || 'en';
  const villaId = new URLSearchParams(window.location.search).get('id');
  const v       = VILLAS.find(x => x.id === villaId) || VILLAS[0];

  document.title = (lang === 'fr' ? v.name_fr : v.name_en) + ' \u2014 Sundara Investment Group';

  buildHero(v, lang);
  buildThumbs(v);
  buildDetail(v, lang);
  buildRelated(v.id, lang);

  const loading = document.getElementById('vdLoading');
  setTimeout(() => {
    loading.classList.add('hidden');
    setTimeout(() => { loading.style.display = 'none'; }, 500);
  }, 300);
}

init();
</script>
